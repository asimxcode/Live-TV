<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveTV - Modern HLS Streaming</title>
  <meta name="description" content="Modern Live TV streaming website built with HTML, JavaScript, and Tailwind CSS." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Manrope", "Segoe UI", "sans-serif"],
            display: ["Space Grotesk", "Segoe UI", "sans-serif"]
          },
          boxShadow: {
            panel: "0 10px 40px rgba(2, 8, 22, 0.45)"
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen overflow-x-hidden bg-slate-950 font-sans text-slate-100">
  <div aria-hidden="true" class="pointer-events-none fixed -left-24 -top-20 h-[340px] w-[340px] rounded-full bg-cyan-400/20 blur-[70px]"></div>
  <div aria-hidden="true" class="pointer-events-none fixed -bottom-48 -right-32 h-[420px] w-[420px] rounded-full bg-emerald-400/20 blur-[70px]"></div>

  <div class="mx-auto my-0 w-[min(1250px,94vw)] py-6 max-[680px]:w-[min(1260px,96vw)] max-[680px]:pt-4">
    <header class="mb-5 grid items-center gap-4 md:grid-cols-[auto,1fr]">
      <div class="flex items-center gap-2.5">
        <span class="h-3.5 w-3.5 rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 shadow-[0_0_0_6px_rgba(18,208,255,0.12)]"></span>
        <h1 class="font-display text-[clamp(1.2rem,1.5vw,1.7rem)] tracking-[0.4px]">LiveTV</h1>
      </div>

      <label class="search-wrap flex h-[46px] items-center gap-2 rounded-full border border-white/20 bg-slate-800/55 px-3.5 transition focus-within:border-cyan-400/90 focus-within:shadow-[0_0_0_4px_rgba(18,208,255,0.16)]" for="searchInput">
        <svg class="h-[18px] w-[18px] text-slate-300" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 21L15.8 15.8M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
        <input id="searchInput" class="w-full border-0 bg-transparent p-0 text-[0.95rem] text-slate-100 placeholder:text-slate-400 focus:outline-none focus:ring-0" type="search" placeholder="Search channels..." autocomplete="off" />
      </label>
    </header>

    <main class="layout grid items-start gap-[22px] xl:grid-cols-[minmax(0,1.6fr)_minmax(0,1fr)]">
      <section class="player-panel rounded-[18px] border border-slate-300/20 bg-slate-900/80 p-[14px] shadow-panel backdrop-blur-md">
        <div class="video-wrap relative aspect-video overflow-hidden rounded-[14px] border border-white/10 bg-[#04070e]">
          <video id="videoPlayer" class="video-player block h-full w-full bg-[#010307]" controls playsinline preload="metadata"></video>

          <div id="bufferingOverlay" class="buffering-overlay hidden absolute inset-0 place-items-center content-center gap-2.5 bg-slate-950/70 text-sm text-slate-200" aria-live="polite">
            <div class="h-11 w-11 animate-spin rounded-full border-4 border-white/25 border-t-cyan-400"></div>
            <p class="m-0">Buffering stream...</p>
          </div>
        </div>

        <div class="now-playing mt-3.5 flex items-center justify-between gap-3 max-[680px]:flex-col max-[680px]:items-start">
          <div>
            <p class="meta-label m-0 text-xs text-slate-400">Now Playing</p>
            <h2 id="nowPlayingName" class="font-display text-[clamp(1rem,1.3vw,1.2rem)]">Select a channel</h2>
          </div>
          <div class="meta-chips flex gap-2">
            <span id="nowPlayingCategory" class="chip inline-flex items-center whitespace-nowrap rounded-full border border-emerald-300/35 bg-emerald-300/10 px-2.5 py-1.5 text-xs text-emerald-200">General</span>
            <span id="streamStatus" class="chip chip-soft inline-flex items-center whitespace-nowrap rounded-full border border-cyan-300/35 bg-cyan-300/10 px-2.5 py-1.5 text-xs text-cyan-200">Idle</span>
          </div>
        </div>
      </section>

      <section class="channels-panel rounded-[18px] border border-slate-300/20 bg-slate-900/70 p-[14px] shadow-panel backdrop-blur-md">
        <div class="filter-row mb-3 flex flex-wrap gap-2">
          <button class="category-btn active rounded-full px-3 py-2 text-sm" data-category="All">All</button>
        </div>
        <div id="channelGrid" class="channel-grid grid grid-cols-[repeat(auto-fill,minmax(150px,1fr))] gap-2.5"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="assets/js/channels.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
